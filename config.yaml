ai:
  default_model: openai
  claude:
    model: claude-sonnet-4-6
  openai:
    model: gpt-4o

blog:
  schedule: "0 9 * * 1,4"  # Mon & Thu at 9am
  mode: review_queue
  dropinblog_id: ""  # set in .env

social:
  twitter:
    schedule: "0 10 * * *"  # daily at 10am
    mode: auto_post
    buffer_profile_id: ""
  linkedin:
    schedule: "0 11 * * 1,3,5"  # MWF at 11am
    mode: review_queue
    buffer_profile_id: ""
  instagram:
    schedule: "0 12 * * 2,5"  # Tue & Fri at noon
    mode: review_queue
    buffer_profile_id: ""

monitoring:
  schedule: "0 */6 * * *"  # every 6 hours
  keywords:
    - "AI small business"
    - "small business automation"
    - "AI tools SMB"
    - "AI for contractors"
    - "business process automation"
  rss_feeds:
    - "https://news.google.com/rss/search?q=AI+small+business"
    - "https://news.google.com/rss/search?q=small+business+automation"
